app-id: io.github.h3nryprod01.AZpdf
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.swift6
command: azpdf
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --env=GTK_USE_PORTAL=1
modules:
  - name: mupdf
    buildsystem: simple
    build-commands:
      - make -j${FLATPAK_BUILDER_N_JOBS} build=release shared=no tesseract=no HAVE_GLUT=no
      - install -Dm755 build/release/mutool /app/azpdf/mutool
    sources:
      - type: archive
        url: https://casper.mupdf.com/downloads/archive/mupdf-1.28.0-source.tar.gz
        sha256: 21c7f064903154f1c3a7458bee81f130fc36f9b5147ea13328f9980e02d2dea2

  - name: azpdf-source
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/swift6/bin
      append-ld-library-path: /usr/lib/sdk/swift6/lib/swift/linux
      env:
        PUB_CACHE: /run/build/azpdf-source/pub-cache
        FLUTTER_SUPPRESS_ANALYTICS: 'true'
        DART_SUPPRESS_ANALYTICS: 'true'
        CI: 'true'
        SOURCE_DATE_EPOCH: '1784310724'
    build-commands:
      - git config --global --add safe.directory /run/build/azpdf-source/flutter-sdk
      - cd source && swift package config set-mirror --original https://github.com/swiftlang/swift-subprocess.git --mirror file:///run/build/azpdf-source/swift-deps/swift-subprocess
      - cd source && swift package config set-mirror --original https://github.com/apple/swift-system --mirror file:///run/build/azpdf-source/swift-deps/swift-system
      - cd source && swift package config set-mirror --original https://github.com/apple/swift-system.git --mirror file:///run/build/azpdf-source/swift-deps/swift-system
      - cd source && swift build -c release --scratch-path .flatpak-swift-build -Xswiftc -static-stdlib --product azpdf-engine
      - flutter-sdk/bin/cache/dart-sdk/bin/dart pub --suppress-analytics --directory flutter-sdk/packages/flutter_tools get --offline --example
      - cd source/Shell/azpdf_desktop && ../../../flutter-sdk/bin/flutter pub get --offline
      - cd source/Shell/azpdf_desktop && ../../../flutter-sdk/bin/flutter analyze --no-pub
      - cd source/Shell/azpdf_desktop && ../../../flutter-sdk/bin/flutter test --no-pub
      - cd source/Shell/azpdf_desktop && ../../../flutter-sdk/bin/flutter build linux --release --no-pub
      - mkdir -p /app/azpdf
      - cp -a source/Shell/azpdf_desktop/build/linux/x64/release/bundle/. /app/azpdf/
      - install -Dm755 source/.flatpak-swift-build/release/azpdf-engine /app/azpdf/azpdf-engine
      - install -Dm644 source/.flatpak-swift-build/release/AZpdf_AZpdfMuPDF.resources/Resources/azpdf_annotations.js /app/azpdf/AZpdf_AZpdfMuPDF.resources/Resources/azpdf_annotations.js
      - install -Dm755 azpdf-flatpak /app/bin/azpdf
      - install -Dm644 io.github.h3nryprod01.AZpdf.desktop /app/share/applications/io.github.h3nryprod01.AZpdf.desktop
      - install -Dm644 io.github.h3nryprod01.AZpdf.metainfo.xml /app/share/metainfo/io.github.h3nryprod01.AZpdf.metainfo.xml
      - install -Dm644 source/Assets/AZpdf.iconset/icon_512x512.png /app/share/icons/hicolor/512x512/apps/io.github.h3nryprod01.AZpdf.png
      - install -Dm644 source/LICENSE /app/share/licenses/io.github.h3nryprod01.AZpdf/LICENSE
      - install -Dm644 source/THIRD_PARTY_NOTICES.md /app/share/licenses/io.github.h3nryprod01.AZpdf/THIRD_PARTY_NOTICES.md
    sources:
      - type: dir
        path: dev/source
        dest: source
      - type: archive
        url: https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.44.0-stable.tar.xz
        sha256: e1ec95e6c550458a34de93580cb85dac24da0e9bedb9bb42811f050ac5a0c7d5
        dest: flutter-sdk
      - type: git
        url: https://github.com/swiftlang/swift-subprocess.git
        commit: 11633673a41f509f8945f23c96c7acd4adafd679
        dest: swift-deps/swift-subprocess
      - type: git
        url: https://github.com/apple/swift-system
        commit: b5544ba79a70a0cb3563e75bf26dc198d6b40ed3
        dest: swift-deps/swift-system
      - flutter-pub-sources.json
      - type: file
        path: azpdf-flatpak
      - type: file
        path: io.github.h3nryprod01.AZpdf.desktop
      - type: file
        path: io.github.h3nryprod01.AZpdf.metainfo.xml
